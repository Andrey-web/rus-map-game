<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта России — Игра</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #e8f4fd;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 {
      flex-shrink: 0;
      font-size: 1.6rem;
      color: #1a3a6b;
      text-align: center;
      padding: 10px 0 6px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      letter-spacing: 1px;
    }

    /* ── Map wrapper ── */
    .map-wrapper {
      position: relative;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .map-wrapper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      user-select: none;
      pointer-events: none;
    }

    /* ── Marker ── */
    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 10;
    }

    .marker .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
        border: 3px solid rgba(255, 80, 80, 0.9);
        animation: pulse-ring 1.6s ease-out infinite;
    }

    .marker .pulse-ring2 {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
        border: 2px solid rgba(200, 0, 0, 0.6);
        animation: pulse-ring 1.6s ease-out 0.5s infinite;
    }

    .marker .icon {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
        background: linear-gradient(135deg, #ff4d4d, #cc0000);
        box-shadow: 0 3px 14px rgba(204, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: float 3s ease-in-out infinite;
    }

    .marker:hover .icon {
      transform: scale(1.2);
      box-shadow: 0 5px 22px rgba(255,140,0,0.9);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(0.85); opacity: 1; }
      70%  { transform: scale(1.6);  opacity: 0; }
      100% { transform: scale(0.85); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* ── Tooltip label ── */
    .marker .label {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 60, 0.88);
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .marker:hover .label { opacity: 1; }

    /* ── Dev tip ── */
    #devTip {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      color: #6688aa;
      padding-bottom: 4px;
      user-select: none;
    }

    /* ── Coordinate picker hint ── */
    #coordHint {
      position: absolute;
      background: rgba(0,0,0,0.82);
      color: #ffe;
      font-size: 13px;
      font-family: monospace;
      padding: 4px 10px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
      white-space: nowrap;
    }

    /* ── Modal overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,30,0.65);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    /* ── Modal box ── */
    .modal {
      background: linear-gradient(160deg, #ffffff, #eef4ff);
      border-radius: 22px;
      padding: 36px 40px 30px;
      width: min(90vw, 90vh);
      max-width: min(90vw, 90vh);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 60px rgba(0,0,60,0.4);
      position: relative;
      animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      text-align: center;
    }

    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 26px;
      cursor: pointer;
      color: #888;
      line-height: 1;
      transition: color 0.2s, transform 0.2s;
    }
    .modal-close:hover { color: #e00; transform: scale(1.2); }

    .modal-emoji {
      font-size: 72px;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      animation: bounce-in 0.4s 0.1s both;
    }

    .modal-emoji img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      margin: 0 auto;
    }

    @keyframes bounce-in {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a3a6b;
      margin-bottom: 6px;
    }

    .modal-tag {
      display: inline-block;
      margin-top: 18px;
      padding: 6px 18px;
      border-radius: 20px;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* ── Symbols panel ── */
    .symbols-panel {
      position: absolute;
      display: flex;
      align-items: flex-end;
      gap: 72px;
      z-index: 20;
    }

    .symbol-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .symbol-item img {
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
      transition: transform 0.18s ease, filter 0.18s ease;
      pointer-events: auto;
      user-select: none;
      cursor: pointer;
    }

    .symbol-item img:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 5px 14px rgba(0,0,0,0.5));
    }

    .symbol-item.skey-item img.playing {
      animation: skey-glow 0.8s ease-in-out infinite alternate;
    }

    @keyframes skey-glow {
      from { filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35)); }
      to   { filter: drop-shadow(0 0 16px rgba(255,200,0,0.95)) drop-shadow(0 0 6px rgba(255,140,0,0.9)); }
    }

    .symbol-label {
      font-size: 13px;
      color: #1a3a6b;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(255,255,255,0.9);
      letter-spacing: 0.3px;
    }

    /* ── Fullscreen image viewer ── */
    .img-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 20, 0.82);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .img-viewer.active { display: flex; }

    .img-viewer img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.7);
      animation: viewer-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .img-viewer.closing img {
      animation: viewer-out 0.4s ease forwards;
    }

    .img-viewer-timer {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      pointer-events: none;
    }

    .img-viewer-bar {
      width: 160px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      overflow: hidden;
    }

    .img-viewer-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 100%;
      transform-origin: left;
      animation: bar-shrink 5s linear forwards;
    }

    @keyframes viewer-pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes viewer-out {
      from { transform: scale(1);   opacity: 1; }
      to   { transform: scale(0.7); opacity: 0; }
    }

    @keyframes bar-shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* ── Visited marker (green, no pulse) ── */
    .marker.visited .pulse-ring,
    .marker.visited .pulse-ring2 {
      display: none;
    }

    .marker.visited .icon {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      box-shadow: 0 3px 14px rgba(46, 125, 50, 0.7);
      animation: none;
    }

    .marker.visited:hover .icon {
      box-shadow: 0 5px 22px rgba(46, 200, 80, 0.9);
    }

    /* ── Адаптация FullHD (1920×1080) ── */
    @media (max-width: 1920px) and (max-height: 1080px) {
      .marker .pulse-ring { inset: -6px; }
      .marker .pulse-ring2 { inset: -10px; }
      .marker .icon {
        width: 56px;
        height: 56px;
        font-size: 30px;
      }
      .marker .label { bottom: 34px; font-size: 10px; }
      .symbols-panel { gap: 48px; }
      .symbol-item img { height: 180px !important; }
      .symbol-label { font-size: 11px; }
    }

    /* ── Адаптация 720p (1280×720) ── */
    @media (max-width: 1280px) and (max-height: 720px) {
      .marker .pulse-ring { inset: -4px; }
      .marker .pulse-ring2 { inset: -8px; }
      .marker .icon {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }
      .marker .label { bottom: 26px; font-size: 9px; }
      .symbols-panel { gap: 28px; }
      .symbol-item img { height: 85px !important; }
      .symbol-label { font-size: 10px; }
    }
  </style>
</head>
<body>

<div class="map-wrapper" id="mapWrapper">
  <img src="./files/img/rusmap.png" alt="Карта России" id="mapImg" />
  <div id="coordHint"></div>

  <!-- Symbols: flag, coat of arms, treble clef -->
  <div class="symbols-panel">
    <div class="symbol-item">
      <img src="./files/img/flag.png" alt="Флаг России" id="flagBtn" style="height:240px;" draggable="false" />
      <span class="symbol-label">Флаг</span>
    </div>
    <div class="symbol-item">
      <img src="./files/img/gerb.png" alt="Герб России" id="gerbBtn" style="height:240px;" draggable="false" />
      <span class="symbol-label">Герб</span>
    </div>
    <div class="symbol-item skey-item">
      <img src="./files/img/skey.png" alt="Гимн России" id="skeyBtn" style="height:240px;" draggable="false" title="Нажми, чтобы услышать гимн" />
      <span class="symbol-label">Гимн</span>
    </div>
  </div>

  <audio id="gymnAudio" src="./files/music/gimn.mp3" preload="auto"></audio>
</div>

<!-- Fullscreen image viewer -->
<div class="img-viewer" id="imgViewer">
  <img id="imgViewerImg" src="" alt="" />
  <div class="img-viewer-timer">
    <div class="img-viewer-bar"><div class="img-viewer-bar-fill" id="imgViewerBar"></div></div>
    <span id="imgViewerCount">5</span>с
  </div>
</div>

<!-- Modal overlay -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <span class="modal-close" id="modalClose">✕</span>
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-title"  id="modalTitle"></div>
  </div>
</div>

<script>
  /* ──────────────────────────────────────────────
     Region data
     x/y = % of image width/height from top-left
  ────────────────────────────────────────────── */
  const regions = [
    {
      id: 'spb1',
      label: 'Детский сад 50',
      title: 'Детский сад 50',
      emoji: '🏛️',
      markerIcon: '🏠',
      zIndex: 12,
      x: 15.7, y: 38,
      freq: [523, 659, 784],
      audio: './files/music/dsad.mp3',
      img: './files/img/dsad.webp',
    },
    {
      id: 'spb2',
      label: 'Санкт-Петербург',
      title: 'Санкт-Петербург',
      emoji: '⚓',
      zIndex: 11,
      img: './files/img/spb.webp',
      x: 14.0, y: 32,
      freq: [659, 784, 880],
      audio: './files/music/spb.mp3'
    },
    {
      id: 'moscow',
      label: 'Москва',
      title: 'Москва',
      emoji: '🔴',
      img: './files/img/kremlin.avif',
      x: 18.5, y: 50,
      freq: [440, 554, 659],
      audio: './files/music/musorskiy.mp3'
    },
    {
      id: 'vladimir',
      label: 'Владимир',
      title: 'Владимир',
      emoji: '⛪',
      img: './files/img/vladmir.jpg',
      x: 22.5, y: 48,
      freq: [392, 494, 587],
      audio: './files/music/hramy.mp3'
    },
    {
      id: 'tatarstan',
      label: 'Татарстан',
      title: 'Татарстан',
        img: './files/img/tatar.webp',
      emoji: '🕌',
      x: 29.5, y: 52,
      freq: [349, 440, 523],
        audio: './files/music/kuraj.mp3'
    },
    {
      id: 'kavkaz',
      label: 'Кавказ',
      title: 'Кавказ',
      emoji: '⛰️',
      img: './files/img/kavkaz.webp',
      x: 21.0, y: 63,
      freq: [262, 330, 392],
      audio: './files/music/lezginka.mp3'
    },
    {
      id: 'ural',
      label: 'Урал',
      title: 'Урал',
      emoji: '💎',
      img: './files/img/ural.jpg',
      x: 40.0, y: 47,
      freq: [294, 370, 440],
        audio: './files/music/ural1.mp3',
    },
    {
      id: 'siberia',
      label: 'Сибирь',
      title: 'Сибирь',
      emoji: '🌲',
      img: './files/img/siberia.webp',
      x: 58.0, y: 43,
      freq: [220, 277, 330],
        audio: './files/music/sibir-g.mp3'
    },
    {
      id: 'fareast',
      label: 'Дальний Восток',
      title: 'Дальний Восток',
      emoji: '🌋',
      img: './files/img/dvostok.jpeg',
      x: 80.0, y: 48,
      freq: [185, 233, 277],
      audio: './files/music/dvostok-b.mp3'
    }
  ];

  /* ──────────────────────────────────────────────
     Build markers after image loads
  ────────────────────────────────────────────── */
  const mapImg     = document.getElementById('mapImg');
  const mapWrapper = document.getElementById('mapWrapper');

  /* Return the pixel rect of the actually-rendered image area inside the container,
     accounting for object-fit: contain letterboxing */
  function getRenderedRect() {
    const cW = mapImg.offsetWidth;
    const cH = mapImg.offsetHeight;
    const natW = mapImg.naturalWidth  || cW;
    const natH = mapImg.naturalHeight || cH;
    const imgRatio = natW / natH;
    const conRatio = cW  / cH;
    let rW, rH, oX, oY;
    if (imgRatio > conRatio) {
      rW = cW; rH = cW / imgRatio;
      oX = 0;  oY = (cH - rH) / 2;
    } else {
      rH = cH; rW = cH * imgRatio;
      oY = 0;  oX = (cW - rW) / 2;
    }
    return { rW, rH, oX, oY };
  }

  const symbolsPanel = document.querySelector('.symbols-panel');

  function positionSymbols() {
    const { rW, rH, oX, oY } = getRenderedRect();
    const PAD = 24;
    symbolsPanel.style.left   = (oX + PAD) + 'px';
    symbolsPanel.style.bottom = (mapWrapper.offsetHeight - oY - rH + PAD) + 'px';
  }

  function buildMarkers() {
    document.querySelectorAll('.marker').forEach(el => el.remove());
    positionSymbols();

    const { rW, rH, oX, oY } = getRenderedRect();

    regions.forEach(r => {
      const el = document.createElement('div');
      el.className = 'marker';
      el.style.left = (oX + r.x / 100 * rW) + 'px';
      el.style.top  = (oY + r.y / 100 * rH) + 'px';
      el.style.zIndex = String(r.zIndex ?? 10);
      el.innerHTML = `
        <div class="pulse-ring"></div>
        <div class="pulse-ring2"></div>
        <div class="icon">${r.markerIcon ?? '?'}</div>
        <div class="label">${r.label}</div>
      `;
      el.addEventListener('click', () => {
        if (!el.classList.contains('visited')) {
          el.classList.add('visited');
          el.querySelector('.icon').textContent = '😊';
        }
        openModal(r);
      });
      mapWrapper.appendChild(el);
    });
  }

  mapImg.addEventListener('load', buildMarkers);
  if (mapImg.complete) buildMarkers();
  window.addEventListener('resize', buildMarkers);

  /* ──────────────────────────────────────────────
     Dev: Shift+click → show coordinates in overlay
  ────────────────────────────────────────────── */
  const coordHint = document.getElementById('coordHint');
  mapWrapper.addEventListener('click', e => {
    if (!e.shiftKey) return;
    e.stopPropagation();
    const { rW, rH, oX, oY } = getRenderedRect();
    const rect = mapWrapper.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const xPct = ((px - oX) / rW * 100).toFixed(1);
    const yPct = ((py - oY) / rH * 100).toFixed(1);
    coordHint.textContent = `x: ${xPct}, y: ${yPct}`;
    coordHint.style.left = (px + 10) + 'px';
    coordHint.style.top  = (py + 10) + 'px';
    coordHint.style.opacity = '1';
    clearTimeout(coordHint._t);
    coordHint._t = setTimeout(() => coordHint.style.opacity = '0', 2500);
  });

  /* ──────────────────────────────────────────────
     Sound synthesis
  ────────────────────────────────────────────── */
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playChord(frequencies) {
    const ctx = getAudioCtx();
    frequencies.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = ctx.currentTime + i * 0.08;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.22, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 1.2);
      osc.start(start);
      osc.stop(start + 1.3);
    });
  }

  /* ──────────────────────────────────────────────
     Modal
  ────────────────────────────────────────────── */
  const overlay      = document.getElementById('overlay');
  const modalClose   = document.getElementById('modalClose');
  const modalEmoji   = document.getElementById('modalEmoji');
  const modalTitle   = document.getElementById('modalTitle');
  let regionAudio = null;

  function openModal(region) {
    if (region.img) {
      modalEmoji.innerHTML = `<img src="${region.img}" alt="${region.title}" />`;
    } else {
      modalEmoji.textContent = region.emoji;
    }
    modalTitle.textContent  = region.title;
    overlay.classList.add('active');

    if (region.audio) {
      if (regionAudio) { regionAudio.pause(); regionAudio.currentTime = 0; }
      regionAudio = new Audio(region.audio);
      regionAudio.play();
    } else {
      playChord(region.freq);
    }
  }

  function closeModal() {
    overlay.classList.remove('active');
    if (regionAudio) { regionAudio.pause(); regionAudio.currentTime = 0; }
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ──────────────────────────────────────────────
     Anthem playback via treble clef button
  ────────────────────────────────────────────── */
  const gymnAudio = document.getElementById('gymnAudio');
  const skeyBtn   = document.getElementById('skeyBtn');

  skeyBtn.addEventListener('click', () => {
    if (gymnAudio.paused) {
      gymnAudio.currentTime = 0;
      gymnAudio.play();
      skeyBtn.classList.add('playing');
    } else {
      gymnAudio.pause();
      gymnAudio.currentTime = 0;
      skeyBtn.classList.remove('playing');
    }
  });

  gymnAudio.addEventListener('ended', () => {
    skeyBtn.classList.remove('playing');
  });

  /* ──────────────────────────────────────────────
     Fullscreen viewer for flag & coat of arms
  ────────────────────────────────────────────── */
  const imgViewer    = document.getElementById('imgViewer');
  const imgViewerImg = document.getElementById('imgViewerImg');
  const imgViewerBar = document.getElementById('imgViewerBar');
  const imgViewerCount = document.getElementById('imgViewerCount');
  let viewerTimer = null;
  let viewerCountInterval = null;

  function openViewer(src, alt) {
    clearTimeout(viewerTimer);
    clearInterval(viewerCountInterval);

    imgViewerImg.src = src;
    imgViewerImg.alt = alt;
    imgViewer.classList.remove('closing');
    imgViewer.classList.add('active');

    // reset bar animation by re-inserting the element
    const freshBar = imgViewerBar.cloneNode(true);
    imgViewerBar.replaceWith(freshBar);

    let secs = 5;
    imgViewerCount.textContent = secs;
    viewerCountInterval = setInterval(() => {
      secs--;
      imgViewerCount.textContent = secs;
      if (secs <= 0) clearInterval(viewerCountInterval);
    }, 1000);

    viewerTimer = setTimeout(closeViewer, 5000);
  }

  function closeViewer() {
    clearTimeout(viewerTimer);
    clearInterval(viewerCountInterval);
    imgViewer.classList.add('closing');
    setTimeout(() => {
      imgViewer.classList.remove('active', 'closing');
    }, 400);
  }

  imgViewer.addEventListener('click', closeViewer);

  document.getElementById('flagBtn').addEventListener('click', () => {
    openViewer('./files/img/flag.png', 'Флаг России');
  });

  document.getElementById('gerbBtn').addEventListener('click', () => {
    openViewer('./files/img/gerb.png', 'Герб России');
  });
</script>
</body>
</html>
